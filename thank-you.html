<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Ravanan Realty</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="stylesheet" href="font/fonts.css">
    <link rel="stylesheet" type="text/css" href="icons/icomoon/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0B1F5B !important;
            color: #ffffff !important;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .thank-you-container {
            text-align: center;
            padding: 60px 40px;
            max-width: 800px;
        }
        
        .thank-you-container h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffffff !important;
        }
        
        .thank-you-container p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #ffffff !important;
            line-height: 1.6;
        }
        
        .download-btn {
            display: inline-block;
            background-color: #7a0f1b;
            color: #ffffff;
            padding: 15px 40px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            border: 2px solid #7a0f1b;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }
        
        .download-btn.disabled {
            background-color: #666;
            border-color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .download-btn.disabled:hover {
            background-color: #666;
            color: #ffffff;
            border-color: #666;
        }
        
        .plot-info {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff !important;
        }
        
        .no-brochure {
            color: #ffcccc;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <h1>Thank You!</h1>
        <p>Your message has been successfully sent. We will get back to you shortly.</p>
        <div id="plotSection"></div>
        <a href="contacts.html" class="download-btn" style="background-color: #ffffff; color: #000000; margin-left: 10px;">Back to Contact</a>
    </div>

    <script>
        // Check if page was accessed via form submission
        const urlParams = new URLSearchParams(window.location.search);
        const plot = urlParams.get('plot');
        
        if (!plot) {
            // Redirect to contacts.html if no plot parameter
            window.location.href = 'contacts.html';
        }
        
        // Display plot info and download button based on selection
        const plotSection = document.getElementById('plotSection');
        
        if (plot === 'taasa medora, urapakkam') {
            plotSection.innerHTML = `
                <p class="plot-info">Selected: TAASA MEDORA, URAPAKKAM</p>
                <a href="Urapakkam brochure.pdf" download class="download-btn">Download Brochure</a>
            `;
        } else if (plot === 'kg garden, thirumazhisai') {
            plotSection.innerHTML = `
                <p class="plot-info">Selected: KG GARDEN, THIRUMAZHISAI</p>
                <a href="KG Garden - Brochure.pdf" download class="download-btn">Download Brochure</a>
            `;
        }
    </script>
</body>
</html>
